worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    server_tokens   off;

    # DNS resolver for upstream host names when proxy_pass uses variables
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # Provide defaults for query parameters using maps
    map $arg_type $post_type {
        ""    hot;
        default $arg_type;
    }

    map $arg_limit $post_limit {
        ""    36;
        default $arg_limit;
    }

    map $arg_sub $subreddit {
        ""    data;
        default $arg_sub;
    }

    server {
        listen 80 default_server;
        server_name localhost;

        # Serve static files from the project root
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Health check
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        # Static content
        location / {
            try_files $uri $uri/ =404;
        }

        # Primary reddit proxy location (match /reddit with or without querystring)
        location ~ ^/reddit\/?$ {
            # Upstream request built from $type and $limit
            proxy_set_header Host www.reddit.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";

            proxy_ssl_server_name on;
            proxy_ssl_name www.reddit.com;

            # Ensure DNS resolution works when using variables in proxy_pass
            resolver 8.8.8.8 1.1.1.1 valid=30s;

            proxy_pass https://www.reddit.com/r/$subreddit/$post_type.json?limit=$post_limit;

            # Rewrite redirects coming from reddit to root
            proxy_redirect https://www.reddit.com/ /;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Optional: serve a helpful 404 page for unknown routes
        error_page 404 /404.html;
        location = /404.html {
            internal;
            add_header Content-Type text/html;
            return 404 '<h1>404 Not Found</h1>';
        }
    }
}
